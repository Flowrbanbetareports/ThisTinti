name: Format alpha.5 legal gate once

on:
  push:
    branches:
      - design/alpha5-identity-motion
    paths:
      - ".github/workflows/format-legal-alpha5-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/alpha5-identity-motion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Format the legal distribution gate
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install ruff==0.15.22
          ruff format scripts/check_legal_distribution.py
          ruff check scripts/check_legal_distribution.py
          rm .github/workflows/format-legal-alpha5-once.yml
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/check_legal_distribution.py .github/workflows/format-legal-alpha5-once.yml
          git commit -m "Format alpha.5 legal distribution gate"
          git push origin HEAD:design/alpha5-identity-motion
