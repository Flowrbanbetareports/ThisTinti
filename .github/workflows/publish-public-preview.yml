name: Publish Public Preview Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-public-preview.yml"

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TAG: v3.4.0-alpha.7-rc.4
      VERSION: 3.4.0-alpha.7-rc.4
      SOURCE_SHA: 13f2adbac1189e2ee9dedd818e7b1993d2b0d845
      ARTIFACT_ID: "8602276404"
      EXPECTED_INSTALLER_SHA256: 584d4d27e8d163f40c461f9ebcfcbeb844c0e909d35b149f3ace3b4d1a4f1faf
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          fetch-depth: 0
          show-progress: false

      - name: Download verified Windows artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > public-preview-artifact.zip

      - name: Extract and verify release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import os
          import zipfile

          root = Path.cwd().resolve()
          archive_path = root / "public-preview-artifact.zip"
          dist = root / "dist"
          version = os.environ["VERSION"]
          expected = os.environ["EXPECTED_INSTALLER_SHA256"]

          with zipfile.ZipFile(archive_path) as archive:
              corrupt = archive.testzip()
              if corrupt:
                  raise RuntimeError(f"Corrupt artifact member: {corrupt}")
              for member in archive.infolist():
                  target = (dist / member.filename).resolve()
                  if target != dist and dist not in target.parents:
                      raise RuntimeError(f"Unsafe artifact path: {member.filename}")
              archive.extractall(dist)

          installer = dist / f"ThisTinti-Setup-{version}-x64.exe"
          required = [
              installer,
              dist / f"ThisTinti-Setup-{version}-x64.exe.sha256",
              dist / f"ThisTinti-Portable-{version}-x64.zip",
              dist / f"ThisTinti-Portable-{version}-x64.zip.sha256",
              dist / f"ThisTinti-{version}-self-hosted-source.zip",
              dist / f"ThisTinti-{version}-self-hosted-source.zip.sha256",
              dist / "frozen-local-smoke.json",
              dist / "installed-local-smoke.json",
          ]
          missing = [str(path.name) for path in required if not path.is_file()]
          if missing:
              raise RuntimeError(f"Missing release files: {missing}")

          actual = hashlib.sha256(installer.read_bytes()).hexdigest()
          if actual != expected:
              raise RuntimeError(f"Installer checksum mismatch: expected={expected} actual={actual}")
          PY

      - name: Prepare release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## ThisTinti 3.4.0-alpha.7-rc.4 — Public Preview

          Questa release corregge in modo strutturale lo scorrimento della navigazione laterale osservato nel collaudo reale su Windows e Chrome, mantenendo le correzioni RC3 sul primo accesso locale.

          ### Correzioni principali

          - la sidebar desktop è suddivisa in logo, area menu realmente scorrevole e riepilogo account;
          - la rotella resta nel menu laterale finché sono disponibili altre voci da raggiungere, senza far scorrere prematuramente la pagina bianca;
          - tutte le voci di **Strumenti avanzati** restano raggiungibili anche su finestre con altezza ridotta;
          - Home, Fine e la selezione da tastiera mantengono visibile la voce attiva;
          - il comportamento mobile rimane invariato;
          - restano attive la scelta automatica tra **Crea spazio** e **Accedi** e la visualizzazione leggibile degli errori.

          ### Per aggiornare

          1. Chiudi ThisTinti.
          2. Scarica `ThisTinti-Setup-3.4.0-alpha.7-rc.4-x64.exe`.
          3. Confronta il checksum SHA-256 allegato: `584d4d27e8d163f40c461f9ebcfcbeb844c0e909d35b149f3ace3b4d1a4f1faf`.
          4. Avvia l’installer sopra la versione esistente: i dati locali vengono conservati.
          5. Dopo il riavvio, passa il puntatore sul pannello blu e usa la rotella per raggiungere tutte le voci.

          ### Verifiche superate

          La build deriva dal commit `13f2adbac1189e2ee9dedd818e7b1993d2b0d845` e ha superato 178 test applicativi con copertura minima del 90%, controlli di sicurezza e dipendenze, Python 3.11–3.12, PostgreSQL/RLS, prova Self-Hosted, smoke test dell’eseguibile congelato e installato, aggiornamento da una precedente alpha, riavvio con persistenza e disinstallazione con conservazione dei dati locali.

          ### Stato e limiti

          Public Preview sperimentale per dimostrazioni e pilot controllati. Gli output sono informativi e devono essere verificati sui documenti originali. ThisTinti non certifica documenti e non prende decisioni al posto dell’organizzazione.

          Il programma non è ancora firmato digitalmente: Windows o il browser possono mostrare un avviso di reputazione.
          EOF

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" \
              --title "ThisTinti ${VERSION} — Public Preview" \
              --notes-file RELEASE_NOTES.md \
              --prerelease
          else
            gh release create "$TAG" dist/* \
              --target "$SOURCE_SHA" \
              --title "ThisTinti ${VERSION} — Public Preview" \
              --notes-file RELEASE_NOTES.md \
              --prerelease
          fi
