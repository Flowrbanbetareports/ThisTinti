name: Publish Public Preview Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-public-preview.yml"

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TAG: v3.4.0-alpha.7-rc.5
      VERSION: 3.4.0-alpha.7-rc.5
      SOURCE_SHA: 3ba42c8fd61043bd57d26fd04d937e7275818300
      ARTIFACT_ID: "8603465283"
      EXPECTED_INSTALLER_SHA256: 3df354de308fcc3d3aba5ea1a3ca85d05c147c9b41f6891f9499bcde458172e1
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.2.2
        with:
          fetch-depth: 0
          show-progress: false

      - name: Download verified Windows artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > public-preview-artifact.zip

      - name: Extract and verify release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import os
          import zipfile

          root = Path.cwd().resolve()
          archive_path = root / "public-preview-artifact.zip"
          dist = root / "dist"
          version = os.environ["VERSION"]
          expected = os.environ["EXPECTED_INSTALLER_SHA256"]

          with zipfile.ZipFile(archive_path) as archive:
              corrupt = archive.testzip()
              if corrupt:
                  raise RuntimeError(f"Corrupt artifact member: {corrupt}")
              for member in archive.infolist():
                  target = (dist / member.filename).resolve()
                  if target != dist and dist not in target.parents:
                      raise RuntimeError(f"Unsafe artifact path: {member.filename}")
              archive.extractall(dist)

          installer = dist / f"ThisTinti-Setup-{version}-x64.exe"
          required = [
              installer,
              dist / f"ThisTinti-Setup-{version}-x64.exe.sha256",
              dist / f"ThisTinti-Portable-{version}-x64.zip",
              dist / f"ThisTinti-Portable-{version}-x64.zip.sha256",
              dist / f"ThisTinti-{version}-self-hosted-source.zip",
              dist / f"ThisTinti-{version}-self-hosted-source.zip.sha256",
              dist / "frozen-local-smoke.json",
              dist / "installed-local-smoke.json",
          ]
          missing = [str(path.name) for path in required if not path.is_file()]
          if missing:
              raise RuntimeError(f"Missing release files: {missing}")

          actual = hashlib.sha256(installer.read_bytes()).hexdigest()
          if actual != expected:
              raise RuntimeError(f"Installer checksum mismatch: expected={expected} actual={actual}")

          for report_name in ("frozen-local-smoke.json", "installed-local-smoke.json"):
              report = json.loads((dist / report_name).read_text(encoding="utf-8-sig"))
              if report.get("passed") is not True:
                  raise RuntimeError(f"Smoke report did not pass: {report_name}")
          PY

      - name: Prepare release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## ThisTinti 3.4.0-alpha.7-rc.5 — Public Preview

          Questa release corregge il difetto residuo del menu laterale riprodotto nel collaudo reale su Windows e Chrome con touchpad.

          ### Correzione principale

          - il pannello **Strumenti avanzati** non viene più compresso internamente e non taglia le voci inferiori;
          - il menu genera ora un overflow reale quando le voci superano l’altezza disponibile;
          - il gesto a due dita e la rotella funzionano sull’intera colonna blu e non spostano la pagina bianca;
          - i delta dei dispositivi espressi in pixel, righe o pagine vengono gestiti correttamente;
          - CSS e JavaScript usano un parametro di versione RC5 per impedire a Chrome di riutilizzare i file delle versioni precedenti dalla cache;
          - un test con Chromium reale apre gli strumenti avanzati, misura l’overflow e verifica lo spostamento del menu.

          ### Per aggiornare

          1. Chiudi completamente ThisTinti e le relative schede del browser.
          2. Scarica `ThisTinti-Setup-3.4.0-alpha.7-rc.5-x64.exe`.
          3. Confronta il checksum SHA-256 allegato: `3df354de308fcc3d3aba5ea1a3ca85d05c147c9b41f6891f9499bcde458172e1`.
          4. Avvia l’installer sopra RC4 senza disinstallare: i dati locali vengono conservati.
          5. Riapri ThisTinti, espandi **Strumenti avanzati** e usa due dita sul touchpad mentre il puntatore è nella colonna blu.

          ### Verifiche superate

          La correzione è presente nel commit `3ba42c8fd61043bd57d26fd04d937e7275818300`. L’artefatto deriva dal contenuto della PR poi unito con squash nello stesso commit principale e ha superato test Chromium dell’overflow reale, test applicativi con copertura minima del 90%, controlli di sicurezza e dipendenze, Python 3.11–3.12, PostgreSQL/RLS, prova Self-Hosted, build e smoke test dell’eseguibile, aggiornamento da una precedente alpha, riavvio con persistenza e disinstallazione con conservazione dei dati locali.

          ### Stato e limiti

          Public Preview sperimentale per dimostrazioni e pilot controllati. Gli output sono informativi e devono essere verificati sui documenti originali. ThisTinti non certifica documenti e non prende decisioni al posto dell’organizzazione.

          Il programma non è ancora firmato digitalmente: Windows o il browser possono mostrare un avviso di reputazione.
          EOF

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" \
              --title "ThisTinti ${VERSION} — Public Preview" \
              --notes-file RELEASE_NOTES.md \
              --prerelease
          else
            gh release create "$TAG" dist/* \
              --target "$SOURCE_SHA" \
              --title "ThisTinti ${VERSION} — Public Preview" \
              --notes-file RELEASE_NOTES.md \
              --prerelease
          fi
