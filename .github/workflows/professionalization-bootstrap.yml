name: Apply verified Alpha.6 payload

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/professionalization-bootstrap.yml"
      - ".professionalization-diagnostics.txt"
      - ".professionalization-transfer/**"

permissions:
  actions: read
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'professionalization/alpha6-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Alpha.6 branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: professionalization/alpha6-foundation
          fetch-depth: 0
          show-progress: false

      - name: Download repaired payload artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            /repos/${GITHUB_REPOSITORY}/actions/artifacts/8553475727/zip \
            > professionalization-artifact.zip

      - name: Verify and apply non-workflow payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib, shutil, zipfile

          root = Path.cwd().resolve()
          outer = root / 'professionalization-artifact.zip'
          artifact_dir = root / '.professionalization-artifact'
          artifact_dir.mkdir(exist_ok=True)

          with zipfile.ZipFile(outer) as archive:
              corrupt = archive.testzip()
              if corrupt:
                  raise RuntimeError(f'corrupt artifact member: {corrupt}')
              for member in archive.infolist():
                  target = (artifact_dir / member.filename).resolve()
                  if target != artifact_dir and artifact_dir not in target.parents:
                      raise RuntimeError(f'unsafe artifact path: {member.filename}')
              archive.extractall(artifact_dir)

          payload = artifact_dir / 'professionalization-transfer-repaired.zip'
          expected = '598e24bde333ecea4c411cb162ccf5d94df3a0a66eb5acc16dc850a0d82a0aa7'
          actual = hashlib.sha256(payload.read_bytes()).hexdigest()
          if actual != expected:
              raise RuntimeError(f'repaired payload checksum mismatch: expected={expected} actual={actual}')

          with zipfile.ZipFile(payload) as archive:
              corrupt = archive.testzip()
              if corrupt:
                  raise RuntimeError(f'corrupt payload member: {corrupt}')
              for member in archive.infolist():
                  target = (root / member.filename).resolve()
                  if target != root and root not in target.parents:
                      raise RuntimeError(f'unsafe payload path: {member.filename}')
              archive.extractall(root)

          deletions = root / '__deletions__.txt'
          if deletions.exists():
              for raw in deletions.read_text(encoding='utf-8').splitlines():
                  rel = raw.strip()
                  if not rel:
                      continue
                  target = (root / rel).resolve()
                  if target != root and root not in target.parents:
                      raise RuntimeError(f'unsafe deletion path: {rel}')
                  if target.is_file() or target.is_symlink():
                      target.unlink()
                  elif target.is_dir():
                      shutil.rmtree(target)
              deletions.unlink()
          PY

          # GitHub's ephemeral token must not rewrite workflow definitions.
          # Those five reviewed files are applied separately through the trusted repository connector.
          git checkout HEAD -- .github
          rm -rf .professionalization-artifact .professionalization-transfer
          rm -f professionalization-artifact.zip .professionalization-diagnostics.txt

      - name: Commit and push application, documentation and tests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply Alpha.6 professionalization foundation'
          git push origin HEAD:professionalization/alpha6-foundation
