name: Apply professionalization transfer

on:
  push:
    branches:
      - professionalization/alpha6-foundation
    paths:
      - ".github/workflows/professionalization-bootstrap.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".professionalization-transfer/**"
      - ".github/workflows/professionalization-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: professionalization/alpha6-foundation
          fetch-depth: 0
      - name: Apply verified transfer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, hashlib, shutil, zipfile

          root = Path.cwd().resolve()
          transfer = root / ".professionalization-transfer"
          chunks = sorted(transfer.glob("chunk-*.txt"))
          encoded = "".join(path.read_text(encoding="ascii") for path in chunks)
          payload = base64.b64decode(encoded, validate=True)
          expected = "9ed7bcb39e0489b83d17b86408818393a24caed7074c8d71d30d7ff7e1a0be8f"
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              diagnostics = [
                  f"expected_payload_sha256={expected}",
                  f"actual_payload_sha256={actual}",
                  f"encoded_length={len(encoded)}",
              ]
              diagnostics.extend(
                  f"{path.name} bytes={path.stat().st_size} git_blob_sha1={hashlib.sha1(b'blob ' + str(path.stat().st_size).encode() + b'\\0' + path.read_bytes()).hexdigest()}"
                  for path in chunks
              )
              (root / ".professionalization-diagnostics.txt").write_text("\n".join(diagnostics) + "\n", encoding="utf-8")
              raise SystemExit(0)

          archive_path = transfer / "transfer.zip"
          archive_path.write_bytes(payload)
          with zipfile.ZipFile(archive_path) as archive:
              archive.testzip()
              for member in archive.infolist():
                  target = (root / member.filename).resolve()
                  if target != root and root not in target.parents:
                      raise SystemExit(f"Unsafe archive path: {member.filename}")
              archive.extractall(root)

          for raw in (root / "__deletions__.txt").read_text(encoding="utf-8").splitlines():
              if raw.strip():
                  (root / raw.strip()).unlink(missing_ok=True)
          (root / "__deletions__.txt").unlink(missing_ok=True)
          shutil.rmtree(transfer)
          (root / ".github/workflows/professionalization-bootstrap.yml").unlink()
          (root / ".professionalization-diagnostics.txt").unlink(missing_ok=True)
          PY
          if [ -f .professionalization-diagnostics.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .professionalization-diagnostics.txt
            git commit -m "Record professionalization transfer diagnostics"
            git push origin HEAD:professionalization/alpha6-foundation
            exit 1
          fi
          node --check app/static/app.js
          python -m compileall -q app scripts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build alpha.6 professionalization foundation"
          git push origin HEAD:professionalization/alpha6-foundation
