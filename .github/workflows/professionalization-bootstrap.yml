name: Apply repaired professionalization transfer

on:
  push:
    branches:
      - professionalization/alpha6-foundation
    paths:
      - ".professionalization-transfer/**"
      - ".github/workflows/professionalization-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: professionalization/alpha6-foundation
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct, repair and apply transfer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, hashlib, shutil, subprocess, zipfile

          root = Path.cwd().resolve()
          transfer = root / ".professionalization-transfer"
          chunks = sorted(transfer.glob("chunk-*.txt"))
          encoded = "".join(path.read_text(encoding="ascii") for path in chunks)
          payload = base64.b64decode(encoded, validate=True)
          expected = "9ed7bcb39e0489b83d17b86408818393a24caed7074c8d71d30d7ff7e1a0be8f"
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              raise RuntimeError(f"payload checksum mismatch: expected={expected} actual={actual}")

          archive_path = transfer / "transfer.zip"
          archive_path.write_bytes(payload)
          usable = archive_path
          try:
              with zipfile.ZipFile(usable) as archive:
                  archive.infolist()
          except zipfile.BadZipFile:
              repaired = transfer / "transfer-repaired.zip"
              subprocess.run(["zip", "-FF", str(archive_path), "--out", str(repaired)], input="\n", text=True, check=True)
              usable = repaired

          with zipfile.ZipFile(usable) as archive:
              if archive.testzip():
                  raise RuntimeError("repaired archive is corrupt")
              for member in archive.infolist():
                  target = (root / member.filename).resolve()
                  if target != root and root not in target.parents:
                      raise RuntimeError(f"unsafe archive path: {member.filename}")
              archive.extractall(root)

          deletions = root / "__deletions__.txt"
          if deletions.exists():
              for raw in deletions.read_text(encoding="utf-8").splitlines():
                  path = raw.strip()
                  if path:
                      candidate = (root / path).resolve()
                      if candidate != root and root not in candidate.parents:
                          raise RuntimeError(f"unsafe deletion path: {path}")
                      if candidate.is_file() or candidate.is_symlink():
                          candidate.unlink()
                      elif candidate.is_dir():
                          shutil.rmtree(candidate)
              deletions.unlink()
          PY

          rm -rf .professionalization-transfer
          rm -f .professionalization-diagnostics.txt
          rm -f .github/workflows/export-professionalization-transfer.yml
          rm -f .github/workflows/professionalization-bootstrap.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply alpha.6 professionalization foundation'
          git push origin HEAD:professionalization/alpha6-foundation
