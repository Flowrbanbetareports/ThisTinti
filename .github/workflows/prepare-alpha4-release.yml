name: Prepare ThisTinti alpha.4 release

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/prepare-alpha4-release.yml"
      - "scripts/prepare_alpha4_release.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'release/v3.4.0-alpha.4'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install release preparation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Prepare version, metadata, site and lifecycle tests
        run: python scripts/prepare_alpha4_release.py
      - name: Validate generated release changes
        run: |
          python -m ruff check scripts/prepare_alpha4_release.py scripts/local_distribution_smoke.py
          python -m compileall -q app scripts tests
          python scripts/check_legal_distribution.py
      - name: Commit prepared release
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No release changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app pyproject.toml installer README.md RELEASE_NOTES.md tests scripts docs site .github/workflows/windows-release.yml
          git commit -m "Prepare ThisTinti 3.4.0-alpha.4"
          git push
