name: Apply RC3 Formatting

on:
  push:
    branches: [agent/fix-local-first-run-rc3]
    paths:
      - ".github/workflows/format-apply-rc3.yml"

permissions:
  contents: write

jobs:
  apply-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: agent/fix-local-first-run-rc3
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff==0.15.22
      - name: Apply the repository formatter
        run: ruff format app tests scripts migrations
      - name: Commit exact formatting result
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app tests scripts migrations
          git commit -m "Apply RC3 formatting"
          git push origin HEAD:agent/fix-local-first-run-rc3
