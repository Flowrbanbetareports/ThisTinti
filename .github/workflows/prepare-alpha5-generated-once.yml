name: Prepare alpha.5 generated metadata once

on:
  push:
    branches:
      - design/alpha5-identity-motion
    paths:
      - ".github/workflows/prepare-alpha5-generated-once.yml"

permissions:
  contents: write

jobs:
  prepare-generated-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Synchronize versioned metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          version = "3.4.0-alpha.5"
          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          old = "Versione: **3.4.0-alpha.4 — Local + Self-Hosted Reference Edition preview**."
          new = f"Versione: **{version} — Local + Self-Hosted Reference Edition preview**."
          if old not in text and new not in text:
              raise SystemExit("README version marker not found")
          readme.write_text(text.replace(old, new), encoding="utf-8")

          openapi = Path("docs/openapi.json")
          schema = json.loads(openapi.read_text(encoding="utf-8"))
          schema.setdefault("info", {})["version"] = version
          openapi.write_text(json.dumps(schema, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          python scripts/generate_sbom.py
          rm .github/workflows/prepare-alpha5-generated-once.yml
      - name: Commit synchronized metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/openapi.json docs/sbom.cdx.json .github/workflows/prepare-alpha5-generated-once.yml
          git commit -m "Synchronize alpha.5 generated metadata"
          git push origin HEAD:design/alpha5-identity-motion
