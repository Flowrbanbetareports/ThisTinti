name: Simplified Product Experience

on:
  pull_request:
    paths:
      - "app/static/app.js"
      - "app/static/app-core.js"
      - "app/static/onboarding.js"
      - "app/static/onboarding.css"
      - "app/static/sidebar-scroll.css"
      - "app/static/sidebar-scroll.js"
      - "app/static/local-first-run.js"
      - "app/static/local-first-run.css"
      - "tests/test_frontend_security.py"
      - "tests/test_security_hardening.py"
      - "tests/test_simplified_experience.py"
      - "scripts/check_sidebar_browser.py"
      - "docs/SIMPLIFIED_PRODUCT_EXPERIENCE_PROGRAM.md"
      - ".github/workflows/simplified-experience.yml"
  push:
    branches: [main]
    paths:
      - "app/static/app.js"
      - "app/static/app-core.js"
      - "app/static/onboarding.js"
      - "app/static/onboarding.css"
      - "app/static/sidebar-scroll.css"
      - "app/static/sidebar-scroll.js"
      - "app/static/local-first-run.js"
      - "app/static/local-first-run.css"
      - "tests/test_frontend_security.py"
      - "tests/test_security_hardening.py"
      - "tests/test_simplified_experience.py"
      - "scripts/check_sidebar_browser.py"
      - "docs/SIMPLIFIED_PRODUCT_EXPERIENCE_PROGRAM.md"
      - ".github/workflows/simplified-experience.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: simplified-experience-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Validate JavaScript syntax
        run: |
          node --check app/static/app.js
          node --check app/static/app-core.js
          node --check app/static/onboarding.js
          node --check app/static/sidebar-scroll.js
          node --check app/static/local-first-run.js
      - name: Install test dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install playwright==1.55.0
          python -m playwright install chromium
      - name: Verify sidebar layout in Chromium
        run: python scripts/check_sidebar_browser.py
      - name: Run experience and security regressions
        run: |
          pytest -q \
            tests/test_frontend_security.py \
            tests/test_simplified_experience.py \
            tests/test_security_hardening.py::test_frontend_core_remains_auditable_with_a_bounded_experience_layer
