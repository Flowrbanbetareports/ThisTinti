name: Apply onboarding and simple guide

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-onboarding-guide.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ux/onboarding-simple-guide
          fetch-depth: 0
      - name: Apply UX changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          index_path = Path('app/static/index.html')
          js_path = Path('app/static/app.js')
          css_path = Path('app/static/styles.css')

          index = index_path.read_text(encoding='utf-8')
          index = index.replace(
              '<div><span>02</span><p>Nessuna azione economica senza approvazione.</p></div>',
              '<div><span>02</span><p>Informazioni chiare, decisioni lasciate all’organizzazione.</p></div>'
          )
          index = index.replace(
              '<button data-view="users" data-admin-only type="button"><span>◇</span> Utenti</button>',
              '<button data-view="users" data-admin-only type="button"><span>◇</span> Utenti</button>\n        <button data-view="guide" type="button"><span>?</span> Guida semplice</button>'
          )
          index = index.replace(
              '<aside class="legal-warning" role="note"><strong>Output automatici da verificare.</strong> Confronta sempre i documenti originali. ThisTinti non autorizza pagamenti e non sostituisce controlli contabili, fiscali o legali. <a href="/legal.html" target="_blank" rel="noopener">Note legali</a></aside>',
              '<aside class="legal-warning" role="note"><strong>Output informativi da verificare.</strong> Confronta sempre i documenti originali. ThisTinti organizza, collega e segnala: l’organizzazione decide come usare i risultati. <a href="/legal.html" target="_blank" rel="noopener">Note legali</a></aside>'
          )
          guide_html = '''
      <div id="guideView" class="view-panel hidden">
        <section class="guide-hero panel">
          <p class="eyebrow">Partenza rapida</p>
          <h3>Capire ThisTinti in tre passaggi</h3>
          <p>ThisTinti mette in ordine documenti collegati, confronta i dati e mostra possibili differenze con le relative prove.</p>
          <div class="guide-steps">
            <article><b>1</b><h4>Carica</h4><p>Inserisci documenti di esempio o file autorizzati.</p></article>
            <article><b>2</b><h4>Collega</h4><p>Il programma riunisce i documenti che parlano della stessa attività.</p></article>
            <article><b>3</b><h4>Controlla</h4><p>Apri le segnalazioni e confrontale con i documenti originali.</p></article>
          </div>
          <div class="modal-actions guide-actions"><button id="guideLoadDemoButton" class="primary-button" data-reviewer-only type="button">Carica un esempio</button><button id="guideUploadButton" class="secondary-button" data-reviewer-only type="button">Carica documenti</button></div>
        </section>
        <section class="guide-grid">
          <article class="panel"><h3>Documenti</h3><p>L’archivio dei file caricati e delle informazioni lette.</p></article>
          <article class="panel"><h3>Catene</h3><p>I gruppi di documenti che sembrano appartenere alla stessa operazione o attività.</p></article>
          <article class="panel"><h3>Anomalie</h3><p>Possibili differenze da controllare, sempre collegate alle prove.</p></article>
          <article class="panel"><h3>Autopilota</h3><p>Osserva i dati e propone controlli che l’organizzazione può accettare, correggere o disattivare.</p></article>
          <article class="panel"><h3>Validation Lab</h3><p>Serve a misurare il comportamento delle regole su esempi con risultati già conosciuti.</p></article>
          <article class="panel"><h3>Audit e utenti</h3><p>Registrano le azioni e stabiliscono chi può amministrare, revisionare o leggere.</p></article>
        </section>
        <section class="panel guide-example"><h3>Esempio semplice</h3><p>Ordine: 10 pezzi. Consegna: 8 pezzi. Fattura: 10 pezzi. ThisTinti non decide quale documento sia corretto: mostra la differenza e i dati da verificare.</p></section>
        <section class="panel guide-boundaries"><h3>Cosa fa e cosa non fa</h3><div><p><strong>Fa:</strong> organizza, collega, confronta e segnala.</p><p><strong>Non fa:</strong> non certifica, non decide e non sostituisce le procedure dell’organizzazione.</p></div></section>
      </div>
'''
          if 'id="guideView"' not in index:
              index = index.replace('      <div id="usersView" class="view-panel hidden">', guide_html + '\n      <div id="usersView" class="view-panel hidden">')
          intro_html = '''
  <dialog id="welcomeDialog" class="modal welcome-modal">
    <article class="modal-card">
      <div class="welcome-brand"><div class="brand-mark small">T</div><div><p class="eyebrow">Benvenuto</p><h3>ThisTinti in 30 secondi</h3></div></div>
      <p class="welcome-lead">Il programma aiuta a mettere in ordine documenti collegati e a trovare punti che meritano un controllo.</p>
      <div class="guide-steps compact">
        <article><b>1</b><h4>Carica</h4><p>Parti da un esempio.</p></article>
        <article><b>2</b><h4>Collega</h4><p>Osserva le catene.</p></article>
        <article><b>3</b><h4>Controlla</h4><p>Apri le prove.</p></article>
      </div>
      <label class="welcome-dismiss"><input id="welcomeDoNotShow" type="checkbox"> Non mostrare più questa introduzione</label>
      <div class="modal-actions"><button id="welcomeGuideButton" class="secondary-button" type="button">Apri guida</button><button id="welcomeDemoButton" class="primary-button" data-reviewer-only type="button">Carica esempio</button><button id="welcomeCloseButton" class="ghost-button" type="button">Inizia</button></div>
    </article>
  </dialog>
'''
          if 'id="welcomeDialog"' not in index:
              index = index.replace('  <script src="/app.js" defer></script>', intro_html + '\n  <script src="/app.js" defer></script>')
          index_path.write_text(index, encoding='utf-8')

          js = js_path.read_text(encoding='utf-8')
          if "guide: ['Aiuto', 'Guida semplice']" not in js:
              js = js.replace("  users: ['Accessi', 'Utenti e ruoli'],", "  users: ['Accessi', 'Utenti e ruoli'],\n  guide: ['Aiuto', 'Guida semplice'],")
          if 'function showWelcomeIfNeeded()' not in js:
              js = js.replace(
                  'function showApp() {',
                  "function showWelcomeIfNeeded() {\n  if (window.localStorage.getItem('thistinti_welcome_seen') === '1') return;\n  window.setTimeout(() => $('#welcomeDialog')?.showModal(), 250);\n}\n\nfunction rememberWelcomePreference() {\n  if ($('#welcomeDoNotShow')?.checked) window.localStorage.setItem('thistinti_welcome_seen', '1');\n}\n\nfunction functionallyEmptyMessage(kind) {\n  const messages = {\n    documents: 'Nessun documento. Carica un esempio oppure aggiungi file autorizzati per iniziare.',\n    chains: 'Nessuna catena. Le catene compaiono quando più documenti condividono riferimenti compatibili.',\n    cases: 'Nessuna anomalia. Le segnalazioni appariranno dopo il confronto dei documenti.'\n  };\n  return messages[kind];\n}\n\nfunction showApp() {"
              )
              js = js.replace('  updateViewChrome(currentView);\n}', '  updateViewChrome(currentView);\n  showWelcomeIfNeeded();\n}', 1)
          js = js.replace('Nessun documento.</td>', "${functionallyEmptyMessage('documents')}</td>")
          js = js.replace('Nessuna catena.</td>', "${functionallyEmptyMessage('chains')}</td>")
          js = js.replace('Nessuna anomalia.</td>', "${functionallyEmptyMessage('cases')}</td>")
          if "$('#welcomeCloseButton').addEventListener" not in js:
              js = js.replace(
                  "$('#logoutButton').addEventListener('click', () => logout());",
                  "$('#logoutButton').addEventListener('click', () => logout());\n$('#welcomeCloseButton').addEventListener('click', () => { rememberWelcomePreference(); $('#welcomeDialog').close(); });\n$('#welcomeGuideButton').addEventListener('click', () => { rememberWelcomePreference(); $('#welcomeDialog').close(); openView('guide'); });\n$('#welcomeDemoButton').addEventListener('click', async () => { rememberWelcomePreference(); $('#welcomeDialog').close(); await loadDemo(); });\n$('#guideLoadDemoButton').addEventListener('click', loadDemo);\n$('#guideUploadButton').addEventListener('click', () => $('#uploadDialog').showModal());"
              )
          js_path.write_text(js, encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          marker = '/* First-run onboarding and simple guide */'
          if marker not in css:
              css += '''

/* First-run onboarding and simple guide */
.guide-hero { padding: clamp(24px, 4vw, 42px); background: linear-gradient(135deg, #fff, var(--accent-soft)); }
.guide-hero > p { max-width: 760px; }
.guide-steps { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin: 24px 0; }
.guide-steps article { padding: 18px; border: 1px solid var(--line); border-radius: 16px; background: var(--surface); }
.guide-steps b { display: grid; place-items: center; width: 32px; height: 32px; border-radius: 10px; background: var(--dark); color: #fff; }
.guide-steps h4 { margin: 12px 0 6px; font-size: 1.05rem; }
.guide-steps p { margin: 0; color: var(--muted); }
.guide-steps.compact article { padding: 14px; }
.guide-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin: 18px 0; }
.guide-grid .panel { margin: 0; }
.guide-example { border-left: 4px solid var(--brand-gold); }
.guide-boundaries { border-left: 4px solid var(--brand-cyan); }
.guide-actions { justify-content: flex-start; }
.welcome-modal .modal-card { width: min(760px, calc(100vw - 32px)); }
.welcome-brand { display: flex; align-items: center; gap: 14px; }
.welcome-brand h3 { margin: 2px 0 0; }
.welcome-lead { font-size: 1.05rem; color: var(--muted); }
.welcome-dismiss { display: flex; align-items: center; gap: 10px; margin-top: 8px; color: var(--muted); }
.welcome-dismiss input { width: 18px; height: 18px; accent-color: var(--accent); }
@media (max-width: 900px) { .guide-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (max-width: 700px) { .guide-steps, .guide-grid { grid-template-columns: 1fr; } }
'''
          css_path.write_text(css, encoding='utf-8')

          Path('.ux-guide-trigger').unlink(missing_ok=True)
          PY
          node --check app/static/app.js
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add onboarding and simple guide' || exit 0
          git push origin HEAD:ux/onboarding-simple-guide
