name: Verify ThisTinti public publication once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-publication-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-publication:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v3.4.0-alpha.4
      RELEASE_COMMIT: 0c461acecd1394ceeabcb41a0d3ca4c2e84406db
      PAGES_URL: https://flowrbanbetareports.github.io/ThisTinti/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for verified prerelease and assets
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 80); do
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > release-api.json 2>/dev/null; then
              if python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('release-api.json').read_text(encoding='utf-8'))
          required = {
              'ThisTinti-Setup-3.4.0-alpha.4-x64.exe',
              'ThisTinti-Setup-3.4.0-alpha.4-x64.exe.sha256',
              'ThisTinti-Portable-3.4.0-alpha.4-x64.zip',
              'ThisTinti-Portable-3.4.0-alpha.4-x64.zip.sha256',
              'ThisTinti-3.4.0-alpha.4-self-hosted-source.zip',
              'ThisTinti-3.4.0-alpha.4-self-hosted-source.zip.sha256',
          }
          names = {asset['name'] for asset in data.get('assets', [])}
          ok = (
              data.get('tag_name') == 'v3.4.0-alpha.4'
              and not data.get('draft')
              and data.get('prerelease') is True
              and required <= names
          )
          raise SystemExit(0 if ok else 1)
          PY
              then
                break
              fi
            fi
            if [[ "$attempt" -eq 80 ]]; then
              echo "Verified prerelease did not become available in time." >&2
              exit 1
            fi
            sleep 30
          done
          git fetch --tags --force
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_COMMIT"
      - name: Wait for the public GitHub Pages download site
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error --location "$PAGES_URL" -o public-index.html \
              && curl --fail --silent --show-error --location "${PAGES_URL}site.js" -o public-site.js \
              && grep -Fq 'ThisTinti — Download gratuito' public-index.html \
              && grep -Fq 'downloadRiskAcceptance' public-index.html \
              && grep -Fq '<img src="logo.svg"' public-index.html \
              && grep -Fq 'releases?per_page=10' public-site.js; then
              break
            fi
            if [[ "$attempt" -eq 60 ]]; then
              echo "GitHub Pages did not expose the expected download site in time." >&2
              exit 1
            fi
            sleep 20
          done
      - name: Record end-to-end publication evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          release = json.loads(Path('release-api.json').read_text(encoding='utf-8'))
          assets = sorted(
              [
                  {
                      'name': asset['name'],
                      'size': asset['size'],
                      'download_url': asset['browser_download_url'],
                  }
                  for asset in release.get('assets', [])
              ],
              key=lambda item: item['name'],
          )

          def sha256(path: str) -> str:
              return hashlib.sha256(Path(path).read_bytes()).hexdigest()

          record = {
              'version': '3.4.0-alpha.4',
              'tag': release['tag_name'],
              'release_commit': os.environ['RELEASE_COMMIT'],
              'release_url': release['html_url'],
              'published_at': release['published_at'],
              'is_draft': release['draft'],
              'is_prerelease': release['prerelease'],
              'asset_count': len(assets),
              'assets': assets,
              'pages_url': os.environ['PAGES_URL'],
              'pages_index_sha256': sha256('public-index.html'),
              'pages_script_sha256': sha256('public-site.js'),
              'verified_at': datetime.now(timezone.utc).isoformat(),
              'verified_by_workflow_run': int(os.environ['GITHUB_RUN_ID']),
          }
          path = Path('builds/publication-latest.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(record, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/publication-latest.json
          if git diff --cached --quiet; then
            echo "Publication evidence already current."
            exit 0
          fi
          git commit -m "Record verified ThisTinti alpha.4 publication"
          git push
