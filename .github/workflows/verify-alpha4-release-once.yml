name: Verify ThisTinti alpha.4 release once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-alpha4-release-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v3.4.0-alpha.4
      RELEASE_COMMIT: 0c461acecd1394ceeabcb41a0d3ca4c2e84406db
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for the public release
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 70); do
            if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json tagName,name,isDraft,isPrerelease,publishedAt,url,targetCommitish,assets > release-view.json 2>/dev/null; then
              break
            fi
            if [[ "$attempt" -eq 70 ]]; then
              echo "Release $RELEASE_TAG was not published within the verification window." >&2
              exit 1
            fi
            sleep 30
          done
          git fetch --tags --force
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_COMMIT"
      - name: Finalize title, notes and prerelease channel
        shell: bash
        run: |
          set -euo pipefail
          cat > release-body.md <<'EOF'
          ## ThisTinti 3.4.0-alpha.4

          Prima alpha pubblica verificata su Windows. È destinata a valutazione e pilot controllati, non all’uso produttivo senza supervisione.

          ### Verifiche completate

          - installazione reale su Windows 11 e primo avvio locale;
          - creazione dello spazio e dell’amministratore;
          - build dell’eseguibile congelato e dell’installer;
          - caricamento dei documenti dimostrativi ed esportazione ZIP;
          - persistenza dopo chiusura e riavvio;
          - aggiornamento dalla alpha precedente;
          - disinstallazione con conservazione dei dati locali;
          - test Python, sicurezza, dipendenze, PostgreSQL/RLS e ambiente self-hosted Docker.

          ### Limiti dichiarati

          L’installer non è firmato digitalmente, quindi Microsoft Defender SmartScreen può indicare “Editore sconosciuto”. ThisTinti può produrre errori e non deve essere l’unica base per pagamenti, contabilità, adempimenti fiscali, pareri legali o decisioni verso terzi. Verificare sempre i documenti originali.

          Le distribuzioni ufficiali non inviano documenti o telemetria all’autore. La Self-Hosted Reference Edition non è un servizio gestito: infrastruttura, privacy, sicurezza, backup, aggiornamenti, costi e incidenti restano sotto la responsabilità dell’organizzazione o del fornitore scelto.

          Leggere `TERMS_OF_USE.md`, `DISCLAIMER.md`, `PRIVACY.md` e i documenti allegati prima dell’uso.
          EOF
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq .id)"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -f name='ThisTinti v3.4.0-alpha.4' \
            -F prerelease=true \
            -f make_latest=false \
            -F body=@release-body.md >/dev/null
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json tagName,name,isDraft,isPrerelease,publishedAt,url,targetCommitish,assets > release-view.json
      - name: Verify downloadable assets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(Path('release-view.json').read_text(encoding='utf-8'))
          if data.get('isDraft'):
              raise SystemExit('Release is still a draft')
          if not data.get('isPrerelease'):
              raise SystemExit('Alpha release is not marked as a prerelease')
          names = {item['name'] for item in data.get('assets', [])}
          required = {
              'ThisTinti-Setup-3.4.0-alpha.4-x64.exe',
              'ThisTinti-Setup-3.4.0-alpha.4-x64.exe.sha256',
              'ThisTinti-Portable-3.4.0-alpha.4-x64.zip',
              'ThisTinti-Portable-3.4.0-alpha.4-x64.zip.sha256',
              'ThisTinti-3.4.0-alpha.4-self-hosted-source.zip',
              'ThisTinti-3.4.0-alpha.4-self-hosted-source.zip.sha256',
              'TERMS_OF_USE.md',
              'DISCLAIMER.md',
              'PRIVACY.md',
              'TRADEMARKS.md',
              'SUPPORT.md',
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f'Missing release assets: {missing}')
          record = {
              'tag': data['tagName'],
              'name': data['name'],
              'release_commit': os.environ['RELEASE_COMMIT'],
              'published_at': data['publishedAt'],
              'url': data['url'],
              'target_commitish': data['targetCommitish'],
              'is_draft': data['isDraft'],
              'is_prerelease': data['isPrerelease'],
              'asset_count': len(data.get('assets', [])),
              'assets': sorted(names),
              'verified_by_workflow_run': int(os.environ['GITHUB_RUN_ID']),
          }
          path = Path('builds/release-latest.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(record, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
      - name: Record verified public release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/release-latest.json
          if git diff --cached --quiet; then
            echo "Release record already current."
            exit 0
          fi
          git commit -m "Record verified ThisTinti alpha.4 release"
          git push
