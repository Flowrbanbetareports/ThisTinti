name: Windows Fix Quality

on:
  pull_request:
    paths:
      - ".github/workflows/windows-fix-quality.yml"
      - "scripts/local_distribution_smoke.py"
      - "installer/windows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Ruff
        run: pip install ruff==0.15.22
      - name: Format changed Python file
        run: ruff format scripts/local_distribution_smoke.py
      - name: Capture lint result
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ruff check scripts/local_distribution_smoke.py 2>&1 | tee ruff-lint.log
      - name: Upload formatted source and lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-fix-quality-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            scripts/local_distribution_smoke.py
            ruff-lint.log
          retention-days: 7
      - name: Fail on lint errors
        if: steps.lint.outcome != 'success'
        run: exit 1
