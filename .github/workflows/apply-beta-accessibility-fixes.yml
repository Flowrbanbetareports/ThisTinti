name: Apply beta accessibility fixes

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/BETA_READINESS_STATUS.md'

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'beta/internal-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: beta/internal-readiness
          fetch-depth: 0
      - name: Label filter controls
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('app/static/index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '<select id="documentTypeFilter">': '<select id="documentTypeFilter" aria-label="Filtra documenti per tipo">',
              '<select id="documentStatusFilter">': '<select id="documentStatusFilter" aria-label="Filtra documenti per stato">',
              '<select id="caseStatusFilter">': '<select id="caseStatusFilter" aria-label="Filtra anomalie per stato">',
              '<select id="caseSeverityFilter">': '<select id="caseSeverityFilter" aria-label="Filtra anomalie per gravità">',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f'accessibility marker missing: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/static/index.html
          git commit -m 'Label document and anomaly filters'
          git push origin HEAD:beta/internal-readiness
