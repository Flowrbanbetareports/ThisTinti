name: Windows Build Diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/windows-build-diagnostics.yml"
      - ".github/workflows/windows-release.yml"
      - "installer/windows/**"
      - "scripts/local_distribution_smoke.py"
      - "requirements-build.txt"
      - "app/version.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build-diagnostics:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        shell: pwsh
        run: python -m pip install -r requirements-build.txt
      - name: Build and capture complete output
        id: build
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          & pwsh -NoLogo -NoProfile -File "installer/windows/build_windows.ps1" *>&1 |
            Tee-Object -FilePath "windows-build.log"
          exit $LASTEXITCODE
      - name: Capture partial outputs and environment
        if: always()
        shell: pwsh
        run: |
          "Build outcome: ${{ steps.build.outcome }}" | Set-Content "windows-build-summary.txt" -Encoding utf8
          "PowerShell: $($PSVersionTable.PSVersion)" | Add-Content "windows-build-summary.txt"
          "Python: $(python --version 2>&1)" | Add-Content "windows-build-summary.txt"
          "Chocolatey: $(choco --version 2>&1)" | Add-Content "windows-build-summary.txt"
          "`nInstalled Tesseract candidates:" | Add-Content "windows-build-summary.txt"
          Get-ChildItem "$env:ProgramFiles", "${env:ProgramFiles(x86)}" -Directory -Filter "*Tesseract*" -ErrorAction SilentlyContinue |
            Select-Object FullName | Format-Table -AutoSize | Out-String | Add-Content "windows-build-summary.txt"
          "`nRelease files:" | Add-Content "windows-build-summary.txt"
          Get-ChildItem "release/windows" -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Add-Content "windows-build-summary.txt"
          "`nDist files:" | Add-Content "windows-build-summary.txt"
          Get-ChildItem "dist" -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Add-Content "windows-build-summary.txt"
      - name: Upload Windows diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            windows-build.log
            windows-build-summary.txt
            release/windows/**
          if-no-files-found: warn
          retention-days: 7
      - name: Fail when build failed
        if: steps.build.outcome != 'success'
        shell: pwsh
        run: exit 1
