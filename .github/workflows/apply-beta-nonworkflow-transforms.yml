name: Apply beta non-workflow transforms

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/BETA_READINESS_STATUS.md'

permissions:
  contents: write

jobs:
  transform:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'beta/internal-readiness'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: beta/internal-readiness
          fetch-depth: 0
      - name: Apply deterministic non-workflow transformations
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise RuntimeError(f'marker not found in {path}: {old[:80]!r}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'README.md',
              'Versione: **3.4.0-alpha.5 — Local + Self-Hosted Reference Edition preview**.',
              'Versione: **3.4.0-alpha.6-rc.1 — candidata tecnica per pilot controllati**.',
          )
          replace_once(
              'README.md',
              'La release è adatta a sviluppo, dimostrazioni e **pilot controllati con documenti anonimizzati**. La dicitura `alpha` è deliberata: il motore è testato, ma deve ancora essere calibrato su documenti reali del settore e non deve autorizzare autonomamente pagamenti o registrazioni contabili.',
              'La candidata è adatta a sviluppo, dimostrazioni e **pilot controllati con documenti autorizzati e anonimizzati**. La dicitura `alpha.6-rc.1` è deliberata: i gate tecnici sono automatizzati, ma la beta validata richiede ancora pilot reale e revisioni indipendenti. Il sistema non deve autorizzare autonomamente pagamenti o registrazioni contabili.',
          )
          replace_once(
              'README.md',
              '- `docs/SECURE_DEVELOPMENT_BASELINE.md`: standard e gate di sviluppo sicuro;',
              '- `docs/SECURE_DEVELOPMENT_BASELINE.md`: standard e gate di sviluppo sicuro;\n- `docs/BETA_READINESS_STATUS.md`: distinzione tra candidata tecnica e beta validata;\n- `docs/ACCESSIBILITY_CONFORMANCE_PLAN.md`: piano WCAG 2.2 AA;\n- `docs/PERFORMANCE_AND_SLO.md`: baseline prestazionale e gate sull’ambiente definitivo;\n- `docs/BETA_EXTERNAL_REVIEW_PACKET.md`: consegna strutturata ai revisori indipendenti;\n- `docs/CODE_SIGNING_RUNBOOK.md`: ciclo di firma Authenticode;',
          )

          release_notes = Path('RELEASE_NOTES.md')
          current = release_notes.read_text(encoding='utf-8')
          heading = '# 3.4.0-alpha.6-rc.1 — Beta readiness foundation\n\n'
          if not current.startswith(heading):
              release_notes.write_text(
                  heading
                  + '- introdotto un gate oggettivo che distingue candidata tecnica e beta validata;\n'
                  + '- aggiunti audit strutturali di accessibilità con target WCAG 2.2 AA;\n'
                  + '- aggiunto un load probe concorrente con report p50/p95/p99 e soglie di regressione;\n'
                  + '- aggiunti registro dei gate esterni, pacchetto revisori, piano SLO e runbook di firma;\n'
                  + '- predisposta provenienza verificabile per gli artefatti Windows;\n'
                  + '- nessuna dichiarazione di beta validata senza pilot reale e revisioni indipendenti.\n\n'
                  + current,
                  encoding='utf-8',
              )

          replace_once('ROADMAP.md', '## Stato attuale — 3.4.0-alpha.5', '## Stato attuale — 3.4.0-alpha.6-rc.1')
          replace_once(
              'ROADMAP.md',
              '- documentazione legale e operativa di base.',
              '- documentazione legale e operativa di base;\n- gate interno beta, audit accessibilità strutturale, load probe e provenienza degli artefatti.',
          )

          readiness = Path('scripts/check_publication_readiness.py')
          text = readiness.read_text(encoding='utf-8')
          marker = '    "docs/PROFESSIONALIZATION_PROGRAM.md",\n'
          additions = (
              marker
              + '    "docs/BETA_READINESS_STATUS.md",\n'
              + '    "docs/BETA_EXTERNAL_REVIEW_PACKET.md",\n'
              + '    "docs/ACCESSIBILITY_CONFORMANCE_PLAN.md",\n'
              + '    "docs/PERFORMANCE_AND_SLO.md",\n'
              + '    "docs/CODE_SIGNING_RUNBOOK.md",\n'
              + '    "docs/evidence/beta/external-gates.json",\n'
          )
          if 'docs/BETA_READINESS_STATUS.md' not in text:
              if marker not in text:
                  raise RuntimeError('publication readiness insertion marker missing')
              text = text.replace(marker, additions, 1)
          readiness.write_text(text, encoding='utf-8')
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md RELEASE_NOTES.md ROADMAP.md scripts/check_publication_readiness.py
          git commit -m 'Complete Alpha.6 RC1 beta readiness metadata'
          git push origin HEAD:beta/internal-readiness
