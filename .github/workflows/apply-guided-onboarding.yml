name: Apply guided onboarding

on:
  push:
    branches:
      - ux/guided-onboarding
    paths:
      - app/static/guide.js
      - app/static/guide.css
      - scripts/apply_guided_onboarding.py
      - tests/test_guided_onboarding.py
      - .github/workflows/apply-guided-onboarding.yml
  pull_request:
    branches:
      - main
    paths:
      - app/static/guide.js
      - app/static/guide.css
      - scripts/apply_guided_onboarding.py
      - tests/test_guided_onboarding.py
      - .github/workflows/apply-guided-onboarding.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: ux/guided-onboarding
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Apply idempotent HTML transform
        run: python scripts/apply_guided_onboarding.py
      - name: Verify frontend syntax and guidance contract
        run: |
          node --check app/static/guide.js
          python -m compileall scripts/apply_guided_onboarding.py tests/test_guided_onboarding.py
          python - <<'PY'
          from pathlib import Path
          index = Path('app/static/index.html').read_text(encoding='utf-8')
          assert '/guide.css' in index
          assert '/guide.js' in index
          assert 'ThisTinti non autorizza pagamenti' not in index
          assert "Le segnalazioni informano" in index
          PY
      - name: Commit transformed interface
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/static/index.html
          git commit -m 'Integrate guided onboarding into the application' || exit 0
          git push origin HEAD:ux/guided-onboarding
