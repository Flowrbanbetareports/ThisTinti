name: Quality Diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: thistinti-quality-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install formatter
        run: pip install ruff==0.15.22
      - name: Generate formatted files
        shell: bash
        run: |
          ruff format scripts/backup_system.py tests/test_backup_restore.py
          mkdir -p formatted/scripts formatted/tests
          cp scripts/backup_system.py formatted/scripts/backup_system.py
          cp tests/test_backup_restore.py formatted/tests/test_backup_restore.py
      - name: Upload formatter output
        uses: actions/upload-artifact@v4
        with:
          name: formatted-files-${{ github.run_id }}
          path: formatted/
          retention-days: 7
