name: Build Windows Free Download

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-release.yml"
      - "app/**"
      - "installer/windows/**"
      - "migrations/**"
      - "samples/**"
      - "scripts/local_distribution_smoke.py"
      - "scripts/package_self_hosted.py"
      - "scripts/generate_brand_icon.py"
      - "requirements*.txt"
      - "run_thistinti.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-release.yml"
      - "app/**"
      - "installer/windows/**"
      - "migrations/**"
      - "samples/**"
      - "scripts/local_distribution_smoke.py"
      - "scripts/package_self_hosted.py"
      - "scripts/generate_brand_icon.py"
      - "requirements*.txt"
      - "run_thistinti.py"
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: thistinti-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt
      - name: Verify source before packaging
        shell: pwsh
        run: |
          python -m pytest -q
          python -m ruff check app tests scripts migrations run_thistinti.py
          python -m bandit -q -r app scripts run_thistinti.py -x tests
          python scripts/check_legal_distribution.py
          python scripts/local_distribution_smoke.py --report local-source-smoke.json
          python scripts/package_self_hosted.py
      - name: Build, freeze and smoke-test installer
        shell: pwsh
        run: |
          ./installer/windows/build_windows.ps1
          Copy-Item "..\ThisTinti-*-self-hosted-source.zip" "release\windows"
          Copy-Item "..\ThisTinti-*-self-hosted-source.zip.sha256" "release\windows"
      - name: Download real previous Windows alpha
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $BaselineVersion = "3.4.0-alpha.4"
          $BaselineDir = "release\baseline"
          New-Item -ItemType Directory -Path $BaselineDir -Force | Out-Null
          gh release download "v$BaselineVersion" `
            --pattern "ThisTinti-Setup-$BaselineVersion-x64.exe" `
            --dir $BaselineDir `
            --clobber
          $BaselineInstaller = Join-Path $BaselineDir "ThisTinti-Setup-$BaselineVersion-x64.exe"
          if (-not (Test-Path $BaselineInstaller) -or (Get-Item $BaselineInstaller).Length -lt 1000000) {
            throw "Published alpha.4 baseline installer unavailable"
          }
      - name: Install previous Windows alpha silently
        id: baseline_install
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $BaselineInstaller = (Resolve-Path "release\baseline\ThisTinti-Setup-3.4.0-alpha.4-x64.exe").Path
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          $LogPath = (Join-Path (Resolve-Path "release\windows") "baseline-install.log")
          $SummaryPath = (Join-Path (Resolve-Path "release\windows") "baseline-install-summary.txt")
          Remove-Item $InstallDir, $DataDir -Recurse -Force -ErrorAction SilentlyContinue
          $Arguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/ACCEPTTHISTINTITERMS=yes",
            "/DIR=$InstallDir",
            "/LOG=$LogPath"
          )
          $Process = Start-Process -FilePath $BaselineInstaller -ArgumentList $Arguments -PassThru
          if (-not $Process.WaitForExit(180000)) {
            Stop-Process -Id $Process.Id -Force -ErrorAction SilentlyContinue
            throw "Baseline silent installation timed out after 180 seconds"
          }
          $ExitCode = $Process.ExitCode
          @(
            "exit_code=$ExitCode"
            "installer=$BaselineInstaller"
            "install_dir=$InstallDir"
            "exe_exists=$(Test-Path (Join-Path $InstallDir 'ThisTinti.exe'))"
            "uninstaller_exists=$(Test-Path (Join-Path $InstallDir 'unins000.exe'))"
          ) | Set-Content $SummaryPath -Encoding utf8
          Get-ChildItem $InstallDir -Recurse -Force -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Add-Content $SummaryPath
          if ($ExitCode -ne 0 -or -not (Test-Path (Join-Path $InstallDir "ThisTinti.exe"))) {
            throw "Baseline silent installation failed"
          }
          New-Item -ItemType Directory -Path $DataDir -Force | Out-Null
          "preserve" | Set-Content (Join-Path $DataDir "upgrade-preservation-marker.txt") -Encoding ascii
      - name: Upload baseline installation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ThisTinti-baseline-install-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release/windows/baseline-install.log
            release/windows/baseline-install-summary.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Stop after baseline installation failure
        if: steps.baseline_install.outcome != 'success'
        shell: pwsh
        run: throw "Baseline installation diagnostics captured"
      - name: Upgrade Windows installation silently
        id: upgrade_install
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Version = (Select-String -Path "app\version.py" -Pattern 'RELEASE_VERSION = "([^"]+)"').Matches.Groups[1].Value
          $CurrentInstaller = (Resolve-Path "release\windows\ThisTinti-Setup-$Version-x64.exe").Path
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          $LogPath = (Join-Path (Resolve-Path "release\windows") "upgrade-install.log")
          $SummaryPath = (Join-Path (Resolve-Path "release\windows") "upgrade-install-summary.txt")
          $Arguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/ACCEPTTHISTINTITERMS=yes",
            "/DIR=$InstallDir",
            "/LOG=$LogPath"
          )
          $TimedOut = $false
          $Process = Start-Process -FilePath $CurrentInstaller -ArgumentList $Arguments -PassThru
          if (-not $Process.WaitForExit(300000)) {
            $TimedOut = $true
            Stop-Process -Id $Process.Id -Force -ErrorAction SilentlyContinue
            $Process.WaitForExit()
          }
          $ExitCode = $Process.ExitCode
          @(
            "timed_out=$TimedOut"
            "exit_code=$ExitCode"
            "installer=$CurrentInstaller"
            "install_dir=$InstallDir"
            "exe_exists=$(Test-Path (Join-Path $InstallDir 'ThisTinti.exe'))"
            "uninstaller_exists=$(Test-Path (Join-Path $InstallDir 'unins000.exe'))"
            "marker_exists=$(Test-Path (Join-Path $DataDir 'upgrade-preservation-marker.txt'))"
          ) | Set-Content $SummaryPath -Encoding utf8
          Get-Process | Where-Object { $_.ProcessName -match 'ThisTinti|setup|unins' } |
            Select-Object ProcessName, Id, StartTime | Format-Table -AutoSize | Out-String | Add-Content $SummaryPath
          if ($TimedOut) { throw "Installer upgrade timed out after 300 seconds" }
          if ($ExitCode -ne 0 -or -not (Test-Path (Join-Path $InstallDir "ThisTinti.exe"))) {
            throw "Installer upgrade failed"
          }
          if (-not (Test-Path (Join-Path $DataDir "upgrade-preservation-marker.txt"))) {
            throw "Installer upgrade did not preserve local data"
          }
      - name: Upload upgrade installation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ThisTinti-upgrade-install-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release/windows/upgrade-install.log
            release/windows/upgrade-install-summary.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Stop after upgrade installation failure
        if: steps.upgrade_install.outcome != 'success'
        shell: pwsh
        run: throw "Upgrade installation diagnostics captured"
      - name: Smoke-test upgraded Windows installation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          python scripts\local_distribution_smoke.py `
            --executable (Join-Path $InstallDir "ThisTinti.exe") `
            --data-dir (Join-Path $DataDir "smoke") `
            --report "release\windows\installed-local-smoke.json"
          if ($LASTEXITCODE -ne 0) { throw "Installed application smoke test failed" }
      - name: Uninstall and verify data preservation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          $Uninstaller = Join-Path $InstallDir "unins000.exe"
          if (-not (Test-Path $Uninstaller)) { throw "Uninstaller not found" }
          $Process = Start-Process -FilePath $Uninstaller -ArgumentList @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART"
          ) -PassThru
          if (-not $Process.WaitForExit(180000)) {
            Stop-Process -Id $Process.Id -Force -ErrorAction SilentlyContinue
            throw "Silent uninstall timed out after 180 seconds"
          }
          if ($Process.ExitCode -ne 0) { throw "Silent uninstall failed" }
          if (Test-Path (Join-Path $InstallDir "ThisTinti.exe")) { throw "Application remained after uninstall" }
          if (-not (Test-Path (Join-Path $DataDir "upgrade-preservation-marker.txt"))) {
            throw "Local data was removed during uninstall"
          }
      - name: Clean installer lifecycle workspace
        if: always()
        shell: pwsh
        run: |
          Remove-Item "release\baseline" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance") -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance") -Recurse -Force -ErrorAction SilentlyContinue
      - name: Upload downloadable artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ThisTinti-Windows-${{ github.run_id }}-${{ github.run_number }}
          path: |
            release/windows/*.exe
            release/windows/*.zip
            release/windows/*.sha256
            release/windows/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Record successful main build
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $artifactName = "ThisTinti-Windows-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_NUMBER"
          $files = Get-ChildItem "release\windows" -File | Sort-Object Name | ForEach-Object {
            [ordered]@{
              name = $_.Name
              size = $_.Length
              sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }
          $metadata = [ordered]@{
            workflow = "Build Windows Free Download"
            run_id = [long]$env:GITHUB_RUN_ID
            run_number = [int]$env:GITHUB_RUN_NUMBER
            head_sha = $env:GITHUB_SHA
            branch = $env:GITHUB_REF_NAME
            artifact_name = $artifactName
            files = @($files)
          }
          New-Item -ItemType Directory -Path "builds" -Force | Out-Null
          $metadata | ConvertTo-Json -Depth 6 | Set-Content "builds\windows-latest.json" -Encoding utf8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "builds/windows-latest.json"
          git commit -m "Record successful Windows build $env:GITHUB_RUN_NUMBER"
          git push
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Copy-Item "TERMS_OF_USE.md", "DISCLAIMER.md", "PRIVACY.md", "TRADEMARKS.md", "SUPPORT.md" "release\windows"
          Copy-Item "docs\RESPONSIBILITY_MATRIX.md" "release\windows\SELF-HOSTED-RESPONSIBILITY-MATRIX.md"
          Copy-Item "docs\ENTERPRISE_ACCEPTANCE_CHECKLIST.md" "release\windows\SELF-HOSTED-ACCEPTANCE-CHECKLIST.md"
          @"
          ### Prima del download
          ThisTinti è software libero e gratuito fornito senza garanzia, assistenza o SLA. Può produrre errori e non deve essere l’unica base per pagamenti, contabilità, adempimenti fiscali, pareri legali o decisioni verso terzi. Verificare sempre i documenti originali.

          Le distribuzioni ufficiali non inviano documenti o telemetria all’autore. La Self-Hosted Reference Edition non è un servizio gestito: l’organizzazione o il fornitore scelto resta responsabile di infrastruttura, privacy, sicurezza, backup, aggiornamenti, costi, incidenti e modifiche. Leggere `TERMS_OF_USE.md`, `DISCLAIMER.md` e la documentazione allegata.
          "@ | Set-Content "release\windows\RELEASE-LEGAL-NOTICE.md" -Encoding utf8
          $files = Get-ChildItem "release\windows" -File | ForEach-Object { $_.FullName }
          gh release create "$env:GITHUB_REF_NAME" $files --title "ThisTinti $env:GITHUB_REF_NAME" --notes-file "release\windows\RELEASE-LEGAL-NOTICE.md"
