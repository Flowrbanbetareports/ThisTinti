name: Build Windows Free Download

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-release.yml"
      - "app/**"
      - "installer/windows/**"
      - "migrations/**"
      - "samples/**"
      - "scripts/local_distribution_smoke.py"
      - "scripts/package_self_hosted.py"
      - "requirements*.txt"
      - "run_thistinti.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-release.yml"
      - "app/**"
      - "installer/windows/**"
      - "migrations/**"
      - "samples/**"
      - "scripts/local_distribution_smoke.py"
      - "scripts/package_self_hosted.py"
      - "requirements*.txt"
      - "run_thistinti.py"
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: thistinti-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt
      - name: Verify source before packaging
        shell: pwsh
        run: |
          python -m pytest -q
          python -m ruff check app tests scripts migrations run_thistinti.py
          python -m bandit -q -r app scripts run_thistinti.py -x tests
          python scripts/check_legal_distribution.py
          python scripts/local_distribution_smoke.py --report local-source-smoke.json
          python scripts/package_self_hosted.py
      - name: Build, freeze and smoke-test installer
        shell: pwsh
        run: |
          ./installer/windows/build_windows.ps1
          Copy-Item "..\ThisTinti-*-self-hosted-source.zip" "release\windows"
          Copy-Item "..\ThisTinti-*-self-hosted-source.zip.sha256" "release\windows"
      - name: Prepare previous-version installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $BaselineVersion = "3.4.0-alpha.3"
          $Iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $Iscc)) { $Iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $Iscc)) { throw "Inno Setup compiler unavailable for lifecycle test" }
          & $Iscc "/DMyAppVersion=$BaselineVersion" "installer\windows\ThisTinti.iss"
          if ($LASTEXITCODE -ne 0) { throw "Baseline installer compilation failed" }
          if (-not (Test-Path "release\windows\ThisTinti-Setup-$BaselineVersion-x64.exe")) {
            throw "Baseline installer was not created"
          }
      - name: Install previous Windows alpha silently
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $BaselineInstaller = (Resolve-Path "release\windows\ThisTinti-Setup-3.4.0-alpha.3-x64.exe").Path
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          Remove-Item $InstallDir, $DataDir -Recurse -Force -ErrorAction SilentlyContinue
          & $BaselineInstaller /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /ACCEPTTHISTINTITERMS=yes "/DIR=$InstallDir"
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path (Join-Path $InstallDir "ThisTinti.exe"))) {
            throw "Baseline silent installation failed"
          }
          New-Item -ItemType Directory -Path $DataDir -Force | Out-Null
          "preserve" | Set-Content (Join-Path $DataDir "upgrade-preservation-marker.txt") -Encoding ascii
      - name: Upgrade Windows installation silently
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Version = (Select-String -Path "app\version.py" -Pattern 'RELEASE_VERSION = "([^"]+)"').Matches.Groups[1].Value
          $CurrentInstaller = (Resolve-Path "release\windows\ThisTinti-Setup-$Version-x64.exe").Path
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          & $CurrentInstaller /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /ACCEPTTHISTINTITERMS=yes "/DIR=$InstallDir"
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path (Join-Path $InstallDir "ThisTinti.exe"))) {
            throw "Installer upgrade failed"
          }
          if (-not (Test-Path (Join-Path $DataDir "upgrade-preservation-marker.txt"))) {
            throw "Installer upgrade did not preserve local data"
          }
      - name: Smoke-test upgraded Windows installation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          python scripts\local_distribution_smoke.py `
            --executable (Join-Path $InstallDir "ThisTinti.exe") `
            --data-dir (Join-Path $DataDir "smoke") `
            --report "release\windows\installed-local-smoke.json"
          if ($LASTEXITCODE -ne 0) { throw "Installed application smoke test failed" }
      - name: Uninstall and verify data preservation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance"
          $DataDir = Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance"
          $Uninstaller = Join-Path $InstallDir "unins000.exe"
          if (-not (Test-Path $Uninstaller)) { throw "Uninstaller not found" }
          & $Uninstaller /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
          if ($LASTEXITCODE -ne 0) { throw "Silent uninstall failed" }
          if (Test-Path (Join-Path $InstallDir "ThisTinti.exe")) { throw "Application remained after uninstall" }
          if (-not (Test-Path (Join-Path $DataDir "upgrade-preservation-marker.txt"))) {
            throw "Local data was removed during uninstall"
          }
      - name: Clean installer lifecycle workspace
        if: always()
        shell: pwsh
        run: |
          Remove-Item "release\windows\ThisTinti-Setup-3.4.0-alpha.3-x64.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:LOCALAPPDATA "Programs\ThisTinti-Acceptance") -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:LOCALAPPDATA "ThisTinti-Acceptance") -Recurse -Force -ErrorAction SilentlyContinue
      - name: Upload downloadable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ThisTinti-Windows-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            release/windows/*.exe
            release/windows/*.zip
            release/windows/*.sha256
            release/windows/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Record successful main build
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $artifactName = "ThisTinti-Windows-$env:GITHUB_REF_NAME-$env:GITHUB_RUN_NUMBER"
          $files = Get-ChildItem "release\windows" -File | Sort-Object Name | ForEach-Object {
            [ordered]@{
              name = $_.Name
              size = $_.Length
              sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }
          $metadata = [ordered]@{
            workflow = "Build Windows Free Download"
            run_id = [long]$env:GITHUB_RUN_ID
            run_number = [int]$env:GITHUB_RUN_NUMBER
            head_sha = $env:GITHUB_SHA
            branch = $env:GITHUB_REF_NAME
            artifact_name = $artifactName
            files = @($files)
          }
          New-Item -ItemType Directory -Path "builds" -Force | Out-Null
          $metadata | ConvertTo-Json -Depth 6 | Set-Content "builds\windows-latest.json" -Encoding utf8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "builds/windows-latest.json"
          git commit -m "Record successful Windows build $env:GITHUB_RUN_NUMBER"
          git push
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Copy-Item "TERMS_OF_USE.md", "DISCLAIMER.md", "PRIVACY.md", "TRADEMARKS.md", "SUPPORT.md" "release\windows"
          Copy-Item "docs\RESPONSIBILITY_MATRIX.md" "release\windows\SELF-HOSTED-RESPONSIBILITY-MATRIX.md"
          Copy-Item "docs\ENTERPRISE_ACCEPTANCE_CHECKLIST.md" "release\windows\SELF-HOSTED-ACCEPTANCE-CHECKLIST.md"
          @"
          ### Prima del download
          ThisTinti è software libero e gratuito fornito senza garanzia, assistenza o SLA. Può produrre errori e non deve essere l’unica base per pagamenti, contabilità, adempimenti fiscali, pareri legali o decisioni verso terzi. Verificare sempre i documenti originali.

          Le distribuzioni ufficiali non inviano documenti o telemetria all’autore. La Self-Hosted Reference Edition non è un servizio gestito: l’organizzazione o il fornitore scelto resta responsabile di infrastruttura, privacy, sicurezza, backup, aggiornamenti, costi, incidenti e modifiche. Leggere `TERMS_OF_USE.md`, `DISCLAIMER.md` e la documentazione allegata.
          "@ | Set-Content "release\windows\RELEASE-LEGAL-NOTICE.md" -Encoding utf8
          $files = Get-ChildItem "release\windows" -File | ForEach-Object { $_.FullName }
          gh release create "$env:GITHUB_REF_NAME" $files --title "ThisTinti $env:GITHUB_REF_NAME" --notes-file "release\windows\RELEASE-LEGAL-NOTICE.md"
