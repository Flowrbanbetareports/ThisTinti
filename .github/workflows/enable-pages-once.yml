name: Enable ThisTinti GitHub Pages once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/enable-pages-once.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Attempt Pages enablement with GitHub Actions as build type
        id: enable
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p builds
          gh api "repos/$GITHUB_REPOSITORY/pages" > pages-before.json 2> pages-before.err
          before_code=$?
          if [[ "$before_code" -eq 0 ]]; then
            cp pages-before.json pages-after.json
            api_code=0
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow > pages-create.json 2> pages-create.err
            api_code=$?
            if [[ "$api_code" -eq 0 ]]; then
              gh api "repos/$GITHUB_REPOSITORY/pages" > pages-after.json 2> pages-after.err
            fi
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def text(name):
              path = Path(name)
              return path.read_text(encoding='utf-8', errors='replace') if path.exists() else None

          def parsed(name):
              value = text(name)
              if not value:
                  return None
              try:
                  return json.loads(value)
              except json.JSONDecodeError:
                  return value

          after = parsed('pages-after.json')
          record = {
              'workflow_run': int(os.environ['GITHUB_RUN_ID']),
              'repository': os.environ['GITHUB_REPOSITORY'],
              'before': parsed('pages-before.json'),
              'before_error': text('pages-before.err'),
              'create_response': parsed('pages-create.json'),
              'create_error': text('pages-create.err'),
              'after': after,
              'enabled': isinstance(after, dict) and bool(after.get('html_url')),
          }
          Path('builds/pages-enablement-attempt.json').write_text(
              json.dumps(record, indent=2, ensure_ascii=False) + '\n', encoding='utf-8'
          )
          PY
          exit "$api_code"
      - name: Record Pages enablement result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/pages-enablement-attempt.json
          git commit -m "Record GitHub Pages enablement attempt"
          git pull --rebase origin main
          git push
      - name: Fail if automatic enablement was rejected
        if: steps.enable.outcome != 'success'
        shell: bash
        run: exit 1
