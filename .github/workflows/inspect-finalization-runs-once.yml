name: Inspect ThisTinti alpha.4 finalization once

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/inspect-finalization-runs-once.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect finalization workflow runs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p builds
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          workflows = [
              'verify-alpha4-release-once.yml',
              'verify-publication-once.yml',
              'pages.yml',
              'windows-release.yml',
          ]
          result = {}
          for workflow in workflows:
              command = [
                  'gh', 'run', 'list', '--repo', repo, '--workflow', workflow,
                  '--limit', '10', '--json',
                  'databaseId,status,conclusion,event,headBranch,headSha,createdAt,updatedAt,url,displayTitle',
              ]
              completed = subprocess.run(command, text=True, capture_output=True, check=True)
              result[workflow] = json.loads(completed.stdout)
          Path('builds/finalization-runs.json').write_text(
              json.dumps(result, indent=2) + '\n', encoding='utf-8'
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/finalization-runs.json
          git commit -m "Record alpha.4 finalization workflow status"
          git push
