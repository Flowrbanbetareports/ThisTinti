name: Apply Ruff formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'professionalization/alpha6-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
        with:
          ref: professionalization/alpha6-foundation
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.22
      - name: Apply verified formatting
        shell: bash
        run: |
          set -euo pipefail
          ruff format app/main.py scripts/validate_pilot_dataset.py
          ruff check app tests scripts migrations
          ruff format --check app tests scripts migrations
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/main.py scripts/validate_pilot_dataset.py
          git commit -m 'Apply Ruff formatting' || exit 0
          git push origin HEAD:professionalization/alpha6-foundation
