name: ThisTinti CI and External Proof

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: thistinti-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install document tools and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl poppler-utils tesseract-ocr tesseract-ocr-eng tesseract-ocr-ita
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check app tests scripts migrations
      - name: Ruff formatting
        run: ruff format --check app tests scripts migrations
      - name: Bandit security scan
        run: bandit -q -r app scripts -x tests
      - name: Python and frontend syntax
        run: |
          python -m compileall app scripts
          node --check app/static/app.js
      - name: Dependency policy
        run: python scripts/check_dependencies.py
      - name: Legal distribution consistency
        run: python scripts/check_legal_distribution.py
      - name: Publication readiness
        run: python scripts/check_publication_readiness.py
      - name: SQLite migration reversibility
        env:
          THISTINTI_DATABASE_URL: sqlite:///./ci.db
          THISTINTI_SECRET_KEY: ci-secret-key-more-than-thirty-two-characters
          THISTINTI_AUTO_CREATE_SCHEMA: "false"
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade base
          alembic upgrade head
          alembic check
      - name: Application tests and coverage
        run: python scripts/run_test_coverage.py
      - name: Document regression and HTTP smoke
        env:
          THISTINTI_DATABASE_URL: sqlite:///./ci.db
          THISTINTI_STORAGE_DIR: ./ci-validation-storage
          THISTINTI_SECRET_KEY: ci-secret-key-more-than-thirty-two-characters
          THISTINTI_AUTO_CREATE_SCHEMA: "false"
        run: |
          python scripts/run_validation_gate.py
          python scripts/http_smoke.py
          python scripts/generate_sbom.py

  python-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      THISTINTI_OCR_ENABLED: "false"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run compatibility tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee "pytest-${{ matrix.python-version }}.log"
      - name: Upload compatibility diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pytest-${{ matrix.python-version }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: pytest-${{ matrix.python-version }}.log
          retention-days: 14

  postgres-external-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: thistinti_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-admin-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d thistinti_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      THISTINTI_ENV: test
      THISTINTI_DATABASE_URL: postgresql+psycopg://thistinti_app:ci-runtime-password@127.0.0.1:5432/thistinti_ci
      THISTINTI_SECRET_KEY: ci-secret-key-more-than-thirty-two-characters
      THISTINTI_AUTO_CREATE_SCHEMA: "false"
      THISTINTI_ALLOW_REGISTRATION: "true"
      THISTINTI_SECURE_COOKIES: "false"
      THISTINTI_CORS_ORIGINS: http://127.0.0.1:8000
      THISTINTI_DATABASE_RATE_LIMITING: "true"
      THISTINTI_ASYNC_INGESTION_ENABLED: "true"
      THISTINTI_ALLOW_SYNCHRONOUS_INGESTION: "false"
      THISTINTI_REQUIRE_MALWARE_SCANNER: "false"
      THISTINTI_OCR_ENABLED: "false"
      THISTINTI_STORAGE_DIR: ./external-proof-data/uploads
      THISTINTI_QUARANTINE_DIR: ./external-proof-data/quarantine
      THISTINTI_REJECTED_DIR: ./external-proof-data/rejected
      THISTINTI_PROOF_URL: http://127.0.0.1:8000
      THISTINTI_PROOF_EMAIL: proof@thistinti.example.com
      THISTINTI_PROOF_PASSWORD: External-Proof-Password-2026!
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Create least-privilege owner and runtime roles
        env:
          THISTINTI_POSTGRES_ADMIN_URL: postgresql://postgres:ci-admin-password@127.0.0.1:5432/thistinti_ci
          THISTINTI_DB_OWNER_USER: thistinti_owner
          THISTINTI_DB_OWNER_PASSWORD: ci-owner-password
          THISTINTI_DB_APP_USER: thistinti_app
          THISTINTI_DB_APP_PASSWORD: ci-runtime-password
        shell: bash
        run: |
          mkdir -p evidence
          set -o pipefail
          python scripts/configure_postgres_roles.py 2>&1 | tee evidence/configure-postgres-roles.log
      - name: Apply migrations as schema owner
        env:
          THISTINTI_PROCESS_ROLE: migrate
          THISTINTI_DATABASE_URL: postgresql+psycopg://thistinti_owner:ci-owner-password@127.0.0.1:5432/thistinti_ci
        run: |
          alembic upgrade head
          alembic check
          test "$(alembic current | grep -c d42a0f61be90)" -eq 1
      - name: Prove PostgreSQL RLS and cross-tenant guards as runtime
        env:
          THISTINTI_PROCESS_ROLE: app
        shell: bash
        run: |
          mkdir -p evidence
          set -o pipefail
          python scripts/postgres_security_smoke.py 2>&1 | tee evidence/postgres-security-smoke.log
      - name: Start app and worker
        run: |
          mkdir -p external-proof-data evidence
          cat > evidence/start-services.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          THISTINTI_PROCESS_ROLE=app python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > evidence/app.log 2>&1 &
          echo $! > evidence/app.pid
          THISTINTI_PROCESS_ROLE=worker python scripts/run_worker.py --poll-seconds 0.2 --worker-id github-proof-worker > evidence/worker.log 2>&1 &
          echo $! > evidence/worker.pid
          SH
          chmod +x evidence/start-services.sh
          evidence/start-services.sh
          for attempt in $(seq 1 60); do
            app_pid="$(cat evidence/app.pid)"
            worker_pid="$(cat evidence/worker.pid)"
            if ! kill -0 "$app_pid" 2>/dev/null; then cat evidence/app.log; exit 1; fi
            if ! kill -0 "$worker_pid" 2>/dev/null; then cat evidence/worker.log; exit 1; fi
            if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat evidence/app.log
          cat evidence/worker.log
          exit 1
      - name: Process a Proof Graph asynchronously
        shell: bash
        run: |
          set -o pipefail
          python scripts/external_cloud_proof.py bootstrap --state evidence/state.json --report evidence/report.json \
            2>&1 | tee evidence/external-proof-bootstrap.log
      - name: Restart app and worker
        shell: bash
        run: |
          old_app_pid="$(cat evidence/app.pid)"
          old_worker_pid="$(cat evidence/worker.pid)"
          kill "$old_app_pid" "$old_worker_pid" 2>/dev/null || true
          for attempt in $(seq 1 60); do
            app_alive=false
            worker_alive=false
            kill -0 "$old_app_pid" 2>/dev/null && app_alive=true
            kill -0 "$old_worker_pid" 2>/dev/null && worker_alive=true
            if [[ "$app_alive" == false && "$worker_alive" == false ]]; then break; fi
            sleep 0.5
          done
          if kill -0 "$old_app_pid" 2>/dev/null || kill -0 "$old_worker_pid" 2>/dev/null; then
            echo "Previous app/worker processes did not terminate" >&2
            ps -fp "$old_app_pid" "$old_worker_pid" || true
            exit 1
          fi
          evidence/start-services.sh
          new_app_pid="$(cat evidence/app.pid)"
          new_worker_pid="$(cat evidence/worker.pid)"
          for attempt in $(seq 1 60); do
            if ! kill -0 "$new_app_pid" 2>/dev/null; then cat evidence/app.log; exit 1; fi
            if ! kill -0 "$new_worker_pid" 2>/dev/null; then cat evidence/worker.log; exit 1; fi
            if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then exit 0; fi
            sleep 1
          done
          cat evidence/app.log
          cat evidence/worker.log
          exit 1
      - name: Verify Proof Graph, files, jobs and audit persistence
        shell: bash
        run: |
          set -o pipefail
          python scripts/external_cloud_proof.py verify --state evidence/state.json --report evidence/report.json \
            2>&1 | tee evidence/external-proof-verify.log
      - name: Capture role and migration evidence
        if: always()
        env:
          PGPASSWORD: ci-admin-password
        shell: bash
        run: |
          mkdir -p evidence
          psql -h 127.0.0.1 -U postgres -d thistinti_ci -Atc \
            "SELECT rolname || ':super=' || rolsuper || ':bypassrls=' || rolbypassrls FROM pg_roles WHERE rolname IN ('thistinti_owner','thistinti_app') ORDER BY rolname" \
            > evidence/postgres-roles.txt 2> evidence/postgres-roles.err || true
          psql -h 127.0.0.1 -U postgres -d thistinti_ci -Atc \
            "SELECT version_num FROM alembic_version" \
            > evidence/alembic-version.txt 2> evidence/alembic-version.err || true
          if [[ -f evidence/app.pid ]]; then kill "$(cat evidence/app.pid)" 2>/dev/null || true; fi
          if [[ -f evidence/worker.pid ]]; then kill "$(cat evidence/worker.pid)" 2>/dev/null || true; fi
      - name: Upload external proof evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: thistinti-external-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: evidence/
          retention-days: 14

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pip-audit==2.10.1
      - name: Audit locked runtime dependencies
        shell: bash
        run: |
          set -o pipefail
          pip-audit -r requirements-linux.lock.txt --no-deps --progress-spinner off 2>&1 | tee dependency-audit.log
      - name: Upload dependency audit diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: dependency-audit.log
          retention-days: 14
