name: RC3 Format Diagnostic

on:
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "scripts/**"
      - "migrations/**"
      - ".github/workflows/format-diagnostic.yml"

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff==0.15.22
      - name: Produce exact formatter patch
        run: |
          ruff format app tests scripts migrations
          git diff --binary > ruff-format.patch
          git diff --name-only > ruff-format-files.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rc3-ruff-format-${{ github.run_id }}
          path: |
            ruff-format.patch
            ruff-format-files.txt
          retention-days: 1
