name: Ruff diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.22
      - name: Capture Ruff output
        id: ruff
        continue-on-error: true
        shell: bash
        run: ruff check app tests scripts migrations --output-format=concise > ruff-diagnostics.txt 2>&1
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ruff-diagnostics-${{ github.run_id }}
          path: ruff-diagnostics.txt
          retention-days: 1
      - if: steps.ruff.outcome == 'failure'
        run: exit 1
