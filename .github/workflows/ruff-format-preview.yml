name: Ruff Format Preview

on:
  push:
    branches: [ux/onboarding-simple-guide]
    paths:
      - ".github/workflows/ruff-format-preview.yml"
      - "tests/test_frontend_security.py"
      - "tests/test_security_hardening.py"
      - "tests/test_simplified_experience.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Format changed Python tests
        run: |
          ruff format \
            tests/test_frontend_security.py \
            tests/test_security_hardening.py \
            tests/test_simplified_experience.py
          git diff --check
          git diff -- \
            tests/test_frontend_security.py \
            tests/test_security_hardening.py \
            tests/test_simplified_experience.py > ruff-format.patch
      - name: Upload formatted files and patch
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ruff-formatted-tests-${{ github.run_id }}
          path: |
            tests/test_frontend_security.py
            tests/test_security_hardening.py
            tests/test_simplified_experience.py
            ruff-format.patch
          retention-days: 2
