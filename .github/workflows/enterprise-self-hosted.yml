name: Enterprise Self-Hosted Reference Proof

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: enterprise-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-reference-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install probe dependencies
        run: pip install PyYAML
      - name: Generate operator-managed configuration locally
        run: |
          python scripts/enterprise_init.py \
            --host thistinti-ci.example.com \
            --deployment-id selfhost-github-${{ github.run_id }} \
            --accept-operator-responsibility \
            --accept-no-support
          python scripts/enterprise_preflight.py --directory deploy/enterprise
          echo "THISTINTI_CI_ADMIN_PASSWORD=$(openssl rand -base64 36 | tr -d '\n')" >> "$GITHUB_ENV"
      - name: Validate Compose model
        working-directory: deploy/enterprise
        run: docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml config --quiet
      - name: Start database and scanner
        working-directory: deploy/enterprise
        run: docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml up -d --build db clamav
      - name: Configure roles and migrate
        working-directory: deploy/enterprise
        run: |
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml up --build --exit-code-from migrate migrate
      - name: Start application and worker
        working-directory: deploy/enterprise
        shell: bash
        run: |
          set -o pipefail
          : > ../../enterprise-start-runtime.log
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml \
            build app worker 2>&1 | tee -a ../../enterprise-start-runtime.log
          # Initialize the shared app_data volume through one container first;
          # concurrent first-use copy-up can race in the Docker daemon.
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml \
            up -d --no-deps --no-build app 2>&1 | tee -a ../../enterprise-start-runtime.log
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml \
            up -d --no-deps --no-build worker 2>&1 | tee -a ../../enterprise-start-runtime.log
      - name: Create first administrator without public registration
        working-directory: deploy/enterprise
        run: |
          printf '%s\n' "$THISTINTI_CI_ADMIN_PASSWORD" | docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml \
            --profile ops run --rm admin-bootstrap \
            python scripts/enterprise_create_admin.py \
            --organization "ThisTinti Enterprise CI" \
            --email enterprise-ci@example.com \
            --password-stdin
      - name: Run authenticated acceptance and wait for readiness
        working-directory: deploy/enterprise
        shell: bash
        run: |
          set -o pipefail
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml exec -T --user thistinti \
            -e THISTINTI_STAGING_URL=http://127.0.0.1:8000 \
            -e THISTINTI_STAGING_ADMIN_EMAIL=enterprise-ci@example.com \
            -e THISTINTI_STAGING_ADMIN_PASSWORD="$THISTINTI_CI_ADMIN_PASSWORD" \
            app python scripts/staging_acceptance.py --token-mode --readiness-timeout 300 \
            --report /tmp/enterprise-acceptance-before-restart.json 2>&1 \
            | tee ../../enterprise-acceptance-before-restart.log
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml \
            cp app:/tmp/enterprise-acceptance-before-restart.json ../../enterprise-acceptance-before-restart.json
      - name: Create and verify backup
        working-directory: deploy/enterprise
        run: |
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml --profile ops run --rm backup \
            python scripts/backup_system.py /backups/enterprise-ci.zip
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml --profile ops run --rm backup \
            python scripts/verify_backup.py /backups/enterprise-ci.zip
      - name: Restart runtime and verify persistence
        working-directory: deploy/enterprise
        run: docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml restart app worker
      - name: Re-run authenticated acceptance
        working-directory: deploy/enterprise
        shell: bash
        run: |
          set -o pipefail
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml exec -T --user thistinti \
            -e THISTINTI_STAGING_URL=http://127.0.0.1:8000 \
            -e THISTINTI_STAGING_ADMIN_EMAIL=enterprise-ci@example.com \
            -e THISTINTI_STAGING_ADMIN_PASSWORD="$THISTINTI_CI_ADMIN_PASSWORD" \
            app python scripts/staging_acceptance.py --token-mode --readiness-timeout 300 \
            --report /tmp/enterprise-acceptance-after-restart.json 2>&1 \
            | tee ../../enterprise-acceptance-after-restart.log
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml \
            cp app:/tmp/enterprise-acceptance-after-restart.json ../../enterprise-acceptance-after-restart.json
      - name: Collect service evidence
        if: always()
        working-directory: deploy/enterprise
        run: |
          mkdir -p ../../enterprise-evidence
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml ps -a > ../../enterprise-evidence/compose-ps.txt || true
          docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml logs --no-color > ../../enterprise-evidence/compose.log || true
          cp ../../enterprise-start-runtime.log ../../enterprise-evidence/ 2>/dev/null || true
          cp ../../enterprise-acceptance-* ../../enterprise-evidence/ 2>/dev/null || true
          cp backups/enterprise-ci.zip ../../enterprise-evidence/ 2>/dev/null || true
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-self-hosted-proof-${{ github.run_id }}
          path: enterprise-evidence/
          retention-days: 14
      - name: Stop stack
        if: always()
        working-directory: deploy/enterprise
        run: docker compose -f docker-compose.enterprise.yml -f docker-compose.ci.yml down -v --remove-orphans
