name: Beta Readiness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  internal-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.2.2
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Prepare evidence directory
        run: mkdir -p beta-evidence
      - name: Check structural accessibility
        run: python scripts/static_accessibility_audit.py --report beta-evidence/accessibility-structural.json
      - name: Check internal beta gates
        run: python scripts/check_beta_readiness.py --report beta-evidence/beta-readiness.json
      - name: Start isolated local application
        env:
          THISTINTI_ENV: test
          THISTINTI_DATABASE_URL: sqlite:///./beta-readiness.db
          THISTINTI_STORAGE_DIR: ./beta-readiness-data/uploads
          THISTINTI_QUARANTINE_DIR: ./beta-readiness-data/quarantine
          THISTINTI_REJECTED_DIR: ./beta-readiness-data/rejected
          THISTINTI_SECRET_KEY: beta-readiness-secret-key-more-than-thirty-two-characters
          THISTINTI_AUTO_CREATE_SCHEMA: "true"
          THISTINTI_ALLOW_REGISTRATION: "true"
          THISTINTI_SECURE_COOKIES: "false"
          THISTINTI_OCR_ENABLED: "false"
          THISTINTI_ASYNC_INGESTION_ENABLED: "false"
        shell: bash
        run: |
          set -euo pipefail
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > beta-evidence/app.log 2>&1 &
          echo $! > beta-evidence/app.pid
          for attempt in $(seq 1 60); do
            if ! kill -0 "$(cat beta-evidence/app.pid)" 2>/dev/null; then
              cat beta-evidence/app.log
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:8000/api/health > beta-evidence/health.json; then
              exit 0
            fi
            sleep 1
          done
          cat beta-evidence/app.log
          exit 1
      - name: Run bounded performance regression
        run: |
          python scripts/beta_load_probe.py \
            --base-url http://127.0.0.1:8000 \
            --path /api/health \
            --path / \
            --requests 200 \
            --concurrency 20 \
            --max-p95-ms 750 \
            --max-error-rate 0 \
            --report beta-evidence/load-probe.json
      - name: Stop isolated application
        if: always()
        shell: bash
        run: |
          if [[ -f beta-evidence/app.pid ]]; then
            kill "$(cat beta-evidence/app.pid)" 2>/dev/null || true
          fi
      - name: Upload beta evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: beta-readiness-${{ github.run_id }}-${{ github.run_attempt }}
          path: beta-evidence/
          retention-days: 30
