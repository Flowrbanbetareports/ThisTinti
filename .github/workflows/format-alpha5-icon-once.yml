name: Format alpha.5 icon sources once

on:
  push:
    branches:
      - design/alpha5-identity-motion
    paths:
      - ".github/workflows/format-alpha5-icon-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/alpha5-identity-motion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Format and validate icon sources
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install ruff==0.12.5 pillow==12.3.0
          ruff check --fix scripts/generate_brand_icon.py scripts/check_publication_readiness.py scripts/verify_release.py tests/test_rebrand.py
          ruff format scripts/generate_brand_icon.py scripts/check_publication_readiness.py scripts/verify_release.py tests/test_rebrand.py
          ruff check scripts/generate_brand_icon.py scripts/check_publication_readiness.py scripts/verify_release.py tests/test_rebrand.py
          python scripts/generate_brand_icon.py --output /tmp/thistinti.ico
          test -s /tmp/thistinti.ico
          rm .github/workflows/format-alpha5-icon-once.yml
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/generate_brand_icon.py scripts/check_publication_readiness.py scripts/verify_release.py tests/test_rebrand.py .github/workflows/format-alpha5-icon-once.yml
          git commit -m "Format and validate alpha.5 icon sources"
          git push origin HEAD:design/alpha5-identity-motion
